app = "projects-service-rodmen07"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  HOST = "0.0.0.0"
  PORT = "3001"
  DATABASE_URL = "sqlite:///data/projects.db"
  AUTH_ENFORCED = "true"
  AUTH_JWT_ALGORITHM = "HS256"
  AUTH_ISSUER = "auth-service"
  ALLOWED_ORIGINS = "https://dynamodb-dashboard-rodmen07.fly.dev,https://rodmen07.github.io"

[[mounts]]
  source = "projects_data"
  destination = "/data"

[[services]]
  internal_port = 3001
  protocol = "tcp"
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.http_checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "20s"
    method = "get"
    path = "/health"
