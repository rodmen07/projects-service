name: Deploy — Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "migrations/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Dockerfile"
      - ".github/workflows/deploy-cloud-run.yml"
  workflow_dispatch:

env:
  GCP_REGION: us-central1
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  SERVICE_NAME: projects-service
  IMAGE_NAME: projects-service

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for OIDC token exchange with GCP WIF

    steps:
      - uses: actions/checkout@v4

      - name: Validate deploy configuration
        id: config
        run: |
          if [ -z "${{ env.GCP_PROJECT_ID }}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping deploy: GCP_PROJECT_ID variable is not set."
            exit 0
          fi
          if [ -z "${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping deploy: GCP_WORKLOAD_IDENTITY_PROVIDER secret is not set."
            exit 0
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Authenticate to Google Cloud
        if: steps.config.outputs.enabled == 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        if: steps.config.outputs.enabled == 'true'
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        if: steps.config.outputs.enabled == 'true'
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        if: steps.config.outputs.enabled == 'true'
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/microservices/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        if: steps.config.outputs.enabled == 'true'
        run: |
          gcloud run deploy "${{ env.SERVICE_NAME }}" \
            --image "$IMAGE" \
            --region "${{ env.GCP_REGION }}" \
            --platform managed \
            --allow-unauthenticated \
            --port 3001 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 2 \
            --service-account "${{ secrets.GCP_SERVICE_ACCOUNT }}" \
            --set-env-vars "HOST=0.0.0.0,PORT=3001,DATABASE_URL=sqlite:////tmp/projects.db,AUTH_ENFORCED=true,AUTH_JWT_ALGORITHM=HS256,AUTH_ISSUER=auth-service,ALLOWED_ORIGINS=${{ vars.ALLOWED_ORIGINS }}" \
            --set-secrets "AUTH_JWT_SECRET=AUTH_JWT_SECRET:latest" \
            --quiet

      - name: Health check
        if: steps.config.outputs.enabled == 'true'
        run: |
          URL=$(gcloud run services describe "${{ env.SERVICE_NAME }}" \
            --region "${{ env.GCP_REGION }}" \
            --format='value(status.url)')
          echo "Service URL: $URL"
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${URL}/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed."
              exit 0
            fi
            echo "Attempt $i: got $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "::error::Health check failed after 2 minutes."
          exit 1
